{% extends "base.html" %}
{% block title %}Create account — Student Management{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <h1 class="auth-heading" id="register-heading">Create Account</h1>
      <p class="auth-sub">Set up your workspace in under a minute.</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" id="register-form" novalidate>
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-input" id="username" name="username"
               placeholder="Choose a username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-input" id="email" name="email"
               placeholder="you@example.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-input" id="password" name="password"
               placeholder="At least 8 characters" autocomplete="new-password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn-submit-register">
        Create account
      </button>
    </form>

    <div class="auth-divider"></div>
    <p class="auth-foot">
      Already have an account?
      <a href="{{ url_for('login') }}" id="link-login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
