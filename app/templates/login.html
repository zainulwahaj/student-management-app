{% extends "base.html" %}
{% block title %}Sign in — Student Management{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <h1 class="auth-heading" id="login-heading">Sign in</h1>
      <p class="auth-sub">Welcome back. Sign in to manage your records.</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" id="login-form" novalidate>
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-input" id="username" name="username"
               placeholder="your-handle" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-input" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn-submit-login">
        Sign in
      </button>
    </form>

    <div class="auth-divider"></div>
    <p class="auth-foot">
      Don't have an account?
      <a href="{{ url_for('register') }}" id="link-register">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
